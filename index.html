<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Camel — Coming Soon</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230078d4'/><text x='16' y='22' font-family='system-ui,sans-serif' font-size='14' font-weight='700' fill='white' text-anchor='middle'>AC</text></svg>"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0f0f0f;
        color: #f0f0f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 520px;
      }

      .logo {
        width: 56px;
        height: 56px;
        background: #0078d4;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.03em;
        margin: 0 auto 1.5rem;
      }

      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #a0a0a0;
        border: 1px solid #2e2e2e;
        border-radius: 999px;
        padding: 6px 16px;
        margin-bottom: 2rem;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 1.25rem;
        color: #ffffff;
      }

      p {
        font-size: 1rem;
        line-height: 1.7;
        color: #888;
        margin-bottom: 2.5rem;
      }

      .divider {
        width: 40px;
        height: 2px;
        background: #2e2e2e;
        margin: 0 auto 2.5rem;
      }

      .contact {
        font-size: 0.875rem;
        color: #555;
      }

      .contact a {
        color: #a0a0a0;
        text-decoration: none;
        border-bottom: 1px solid #333;
        transition:
          color 0.2s,
          border-color 0.2s;
      }

      .contact a:hover {
        color: #f0f0f0;
        border-color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">AC</div>
      <span class="badge">Azure Camel</span>
      <h1>Something's on the way.</h1>
      <p>
        We're building something new. Check back soon, it'll be worth the wait.
      </p>
      <div class="divider"></div>
      <p class="contact">
        Questions? Reach us at
        <a href="mailto:Yasir@AzureCamel.com">Yasir@AzureCamel.com</a>
      </p>
    </div>
  </body>
</html>
